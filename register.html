<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <title>Create Account â€” AquaGo | Join the Adventure</title>
    <meta name="description"
        content="Create your free AquaGo account to book river adventures, track trips, save favorite routes and access exclusive member deals." />
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="auth-page">
    <div class="auth-bg" aria-hidden="true"></div>
    <div class="auth-wrap">
        <div class="nav-controls" aria-label="Page controls">
            <button class="btn-toggle theme-toggle-btn" aria-label="Toggle dark mode">
                <i class="bi bi-moon-fill"></i>
            </button>
            <button class="btn-toggle rtl-toggle-btn" aria-label="Toggle RTL" title="RTL Mode">
                <i class="bi bi-arrow-left-right"></i>
            </button>
        </div>
        <div class="auth-card">
            <div style="text-align:center;margin-bottom:1.8rem;">
                <a href="index.html" class="d-inline-flex align-items-center gap-2 text-decoration-none mb-3"
                    aria-label="Back to homepage"
                    style="font-family:var(--font-h);font-size:1.6rem;font-weight:800;color:var(--text);line-height:1;">
                    <span style="font-size:1.8rem;">🌊</span>
                    <span>Aqua<span style="color:var(--accent);">Go</span></span>
                </a>
                <h1
                    style="font-size:1.4rem;font-weight:700;font-family:var(--font-h);margin-bottom:0;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">
                    Sign Up</h1>
            </div>

            <form id="registerForm" novalidate>
                <div class="mb-3">
                    <label class="form-label-rr" for="regFirst">First Name *</label>
                    <input type="text" id="regFirst" name="firstName" class="form-control-rr" placeholder="John"
                        required autocomplete="given-name">
                </div>
                <div class="mb-3">
                    <label class="form-label-rr" for="regLast">Last Name *</label>
                    <input type="text" id="regLast" name="lastName" class="form-control-rr" placeholder="Smith" required
                        autocomplete="family-name">
                </div>
                <div class="mb-3">
                    <label class="form-label-rr" for="regEmail">Email Address *</label>
                    <div style="position:relative;">
                        <i class="bi bi-envelope"
                            style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>
                        <input type="email" id="regEmail" name="email" class="form-control-rr"
                            style="padding-left:42px;" placeholder="john@email.com" required autocomplete="email">
                    </div>
                </div>
                <div class="mb-1">
                    <label class="form-label-rr" for="regPassword">Password *</label>
                    <div style="position:relative;">
                        <i class="bi bi-lock"
                            style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>
                        <input type="password" id="regPassword" name="password" class="form-control-rr"
                            style="padding-left:42px;padding-right:42px;" placeholder="Min 8 characters" required
                            autocomplete="new-password">
                        <button type="button"
                            style="position:absolute;right:0;top:0;height:100%;background:none;border:none;padding:0 14px;cursor:pointer;color:var(--text-light);"
                            aria-label="Toggle password visibility"
                            onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password';this.querySelector('i').classList.toggle('bi-eye');this.querySelector('i').classList.toggle('bi-eye-slash');">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <!-- Password strength meter -->
                <div class="pw-strength-bar mb-3" id="pwStrengthBar" aria-label="Password strength indicator">
                    <div class="pw-strength-fill" id="pwStrengthFill"></div>
                </div>
                <div class="mb-4">
                    <label class="form-label-rr" for="regPasswordConf">Confirm Password *</label>
                    <div style="position:relative;">
                        <i class="bi bi-lock-fill"
                            style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-light);"></i>
                        <input type="password" id="regPasswordConf" name="passwordConfirm" class="form-control-rr"
                            style="padding-left:42px;padding-right:42px;" placeholder="Repeat password" required
                            autocomplete="new-password">
                        <button type="button"
                            style="position:absolute;right:0;top:0;height:100%;background:none;border:none;padding:0 14px;cursor:pointer;color:var(--text-light);"
                            aria-label="Toggle password visibility"
                            onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password';this.querySelector('i').classList.toggle('bi-eye');this.querySelector('i').classList.toggle('bi-eye-slash');">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-4">
                    <label
                        style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:.88rem;color:var(--text-muted);">
                        <input type="checkbox" name="terms"
                            style="accent-color:var(--primary);width:16px;height:16px;flex-shrink:0;margin-top:2px;"
                            required>
                        <span>I agree to the <a href="#" style="color:var(--primary);">Terms of Service</a> and <a
                                href="#" style="color:var(--primary);">Privacy Policy</a>. I'm 16 years of age or older.
                            *</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary-rr w-100 justify-content-center"
                    style="font-size:1rem;padding:15px;">
                    <i class="bi bi-person-plus-fill"></i> Create My Account
                </button>
            </form>

            <div style="display:flex;align-items:center;gap:.8rem;margin:2rem 0 1.5rem;" aria-hidden="true">
                <div style="flex:1;height:1px;background:var(--border);"></div>
                <span style="color:var(--text-muted);font-size:.83rem;">or register with social</span>
                <div style="flex:1;height:1px;background:var(--border);"></div>
            </div>

            <div class="d-flex flex-row gap-2 mb-4">
                <a href="#" class="btn-outline-rr flex-fill justify-content-center"
                    style="padding:12px;font-size:.85rem;" aria-label="Sign up with Google">
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span>Google</span>
                </a>
                <a href="#" class="btn-outline-rr flex-fill justify-content-center"
                    style="padding:12px;font-size:.85rem;" aria-label="Sign up with Facebook">
                    <i class="bi bi-facebook" style="font-size:1.1rem;color:#1877F2;"></i>
                    <span>Facebook</span>
                </a>
                <a href="#" class="btn-outline-rr flex-fill justify-content-center"
                    style="padding:12px;font-size:.85rem;" aria-label="Sign up with Apple">
                    <i class="bi bi-apple" style="font-size:1.1rem;color:#111111;"></i>
                    <span>Apple</span>
                </a>
            </div>

            <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:.9rem;">
                Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Sign In</a>
            </p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
